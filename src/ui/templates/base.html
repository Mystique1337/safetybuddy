<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SafetyBuddy{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-shield-check"></i>
            <span>SafetyBuddy</span>
        </div>
        <ul class="sidebar-nav">
            <li class="{% if request.path == '/' %}active{% endif %}">
                <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            </li>
            <li class="{% if request.path == '/chat' %}active{% endif %}">
                <a href="/chat"><i class="bi bi-chat-dots"></i> Chat</a>
            </li>
            <li class="{% if request.path == '/monitor' %}active{% endif %}">
                <a href="/monitor"><i class="bi bi-camera-video"></i> Video Monitor</a>
            </li>
            <li class="{% if request.path == '/compliance' %}active{% endif %}">
                <a href="/compliance"><i class="bi bi-clipboard-check"></i> Compliance</a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="status-indicator" id="apiStatus">
                <span class="status-dot"></span>
                <small>Checking API...</small>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="btn btn-link sidebar-toggle d-md-none" onclick="toggleSidebar()">
                <i class="bi bi-list fs-4"></i>
            </button>
            <h5 class="topbar-title mb-0">{% block page_title %}Dashboard{% endblock %}</h5>
            <div class="topbar-right">
                <span class="badge bg-primary me-2" id="alertBadge" style="display:none;">
                    <i class="bi bi-bell"></i> <span id="alertCount">0</span>
                </span>
                <small class="text-muted" id="clock"></small>
            </div>
        </header>

        <!-- Page Content -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
